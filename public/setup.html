<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Veridict — 초기 설정</title>
  <link rel="stylesheet" href="/app.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .setup-card {
      max-width: 640px; width: 100%;
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 32px 36px;
    }
    .setup-card h1 { margin: 0 0 8px; font-size: 20px; }
    .setup-card .sub { color: var(--muted); margin: 0 0 24px; font-size: 13px; }
    .setup-card p { line-height: 1.65; color: #c7ccd5; }
    .setup-card ol { padding-left: 22px; color: #c7ccd5; line-height: 1.8; }
    .setup-card code {
      background: #11131a; border: 1px solid var(--border); border-radius: 4px;
      padding: 2px 6px; font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12.5px;
    }
    .setup-card a { color: var(--accent); text-decoration: none; }
    .setup-card a:hover { text-decoration: underline; }
    .actions { margin-top: 24px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .actions button.primary {
      background: var(--accent); color: white; border: none;
      padding: 10px 18px; border-radius: 8px; font-size: 13.5px; font-weight: 500; cursor: pointer;
    }
    .actions button.primary:disabled { background: var(--accent-soft); cursor: not-allowed; color: var(--muted); }
    .actions button.ghost {
      background: transparent; color: var(--text); border: 1px solid var(--border);
      padding: 10px 16px; border-radius: 8px; font-size: 13px; cursor: pointer;
    }
    .actions button.ghost:hover { background: var(--surface-2); }
    .status {
      margin-top: 20px; padding: 10px 14px; background: #11131a;
      border: 1px solid var(--border); border-radius: 6px;
      font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12px; color: var(--muted);
    }
    .status .dot {
      display: inline-block; width: 7px; height: 7px; border-radius: 50%;
      background: var(--muted); margin-right: 8px; vertical-align: middle;
    }
    .status.checking .dot { background: var(--warning); animation: pulse 1.2s infinite; }
    .status.success .dot { background: var(--success); }
    .status.error .dot { background: var(--error); }
    @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
    .muted-note { margin-top: 18px; font-size: 11.5px; color: var(--muted); line-height: 1.55; }
  </style>
</head>
<body>
  <div class="setup-card">
    <div id="content"><!-- 동적 --></div>
    <div class="actions" id="actions"></div>
    <div class="status checking" id="status"><span class="dot"></span><span id="statusText">상태 확인 중...</span></div>
    <div class="muted-note">
      Veridict 는 API 키나 자격증명을 저장하지 않습니다. 인증은 전적으로 Claude Code CLI 가 관리하며,
      이 화면은 그 인증 상태가 확인되면 자동으로 닫힙니다.
    </div>
  </div>

<script>
const qs = new URLSearchParams(location.search);
const reason = qs.get('reason') || 'missing';  // missing | login

const contentEl = document.getElementById('content');
const actionsEl = document.getElementById('actions');
const statusEl = document.getElementById('status');
const statusText = document.getElementById('statusText');

function setStatus(state, text) {
  statusEl.className = 'status ' + state;
  statusText.textContent = text;
}

function renderMissing() {
  contentEl.innerHTML = `
    <h1>Claude Code CLI 가 필요합니다</h1>
    <p class="sub">Veridict 는 사용자의 Claude Pro/Max 구독으로 동작하는 <code>claude</code> CLI 를 호출해 분석을 수행합니다.</p>
    <p>다음 단계를 따라주세요:</p>
    <ol>
      <li>Claude Code CLI 설치 → <a href="https://claude.com/code" target="_blank" rel="noopener">claude.com/code</a></li>
      <li>설치가 끝나면 아래 "상태 새로고침" 버튼을 누르세요. CLI 가 감지되면 로그인 안내로 자동 전환됩니다.</li>
    </ol>
  `;
  actionsEl.innerHTML = `
    <button class="primary" onclick="window.open('https://claude.com/code','_blank','noopener')">설치 페이지 열기</button>
    <button class="ghost" onclick="probe()">상태 새로고침</button>
  `;
}

function renderLogin() {
  contentEl.innerHTML = `
    <h1>Claude 로그인이 필요합니다</h1>
    <p class="sub">아래 버튼을 누르면 새 터미널 창에서 <code>claude auth login</code> 이 실행됩니다. 그 안에서 본인 Claude 계정으로 OAuth 로그인을 진행해 주세요.</p>
    <p>로그인이 완료되면 이 화면은 <strong>자동으로 닫히고 메인 화면으로 전환</strong>됩니다 (5초마다 자동 확인).</p>
  `;
  actionsEl.innerHTML = `
    <button class="primary" id="loginBtn" onclick="startLogin()">터미널에서 로그인 시작</button>
    <button class="ghost" onclick="probe()">지금 다시 확인</button>
  `;
}

async function startLogin() {
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = '터미널 여는 중...';
  try {
    const res = await fetch('/api/claude-login', { method: 'POST' });
    if (!res.ok) throw new Error('서버 응답 ' + res.status);
    setStatus('checking', '새 터미널에서 OAuth 진행 중... 완료되면 자동 감지됩니다.');
  } catch (e) {
    setStatus('error', '터미널 실행 실패: ' + e.message);
  } finally {
    setTimeout(() => { btn.disabled = false; btn.textContent = '터미널에서 로그인 시작'; }, 2000);
  }
}

async function probe() {
  setStatus('checking', '확인 중...');
  let json;
  try {
    const res = await fetch('/api/claude-status', { cache: 'no-store' });
    json = await res.json();
  } catch (e) {
    setStatus('error', '확인 실패: ' + e.message);
    return null;
  }
  if (json.binary && json.authenticated) {
    setStatus('success', `로그인 확인됨 (${json.email ?? ''}). 메인 화면으로 이동합니다...`);
    setTimeout(() => { location.href = '/'; }, 800);
    return json;
  }
  if (!json.binary) {
    if (reason !== 'missing') { location.search = '?reason=missing'; return json; }
    setStatus('error', 'claude CLI 가 아직 감지되지 않았습니다.');
  } else {
    if (reason !== 'login') { location.search = '?reason=login'; return json; }
    setStatus('checking', 'CLI 감지됨. 로그인 대기 중...');
  }
  return json;
}

// 초기 렌더 + 폴링
if (reason === 'missing') renderMissing();
else renderLogin();
probe();
setInterval(probe, 5000);
</script>
</body>
</html>
