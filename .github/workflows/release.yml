name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '빌드할 기존 태그 (예: v0.2.2)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build: npx electron-builder --win --x64 --publish never
            pattern: dist/PAA-*.exe
          - os: macos-latest
            build: npx electron-builder --mac dmg --x64 --arm64 --publish never
            pattern: dist/PAA-*.dmg
    runs-on: ${{ matrix.os }}
    steps:
      - name: Resolve build ref
        id: ref
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: ${{ matrix.build }}

      - name: List artifacts
        shell: bash
        run: ls -lh dist

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ref.outputs.ref }}
          files: ${{ matrix.pattern }}
